name: Deploy to GitHub Pages

on:
  push:
    branches: 'master'

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se acumulen despliegues si haces push muy seguidos
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Usamos el string para asegurar la última revisión de la v22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # 'npm ci' es más limpio para entornos de CI que 'npm install'

      - name: Build
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4