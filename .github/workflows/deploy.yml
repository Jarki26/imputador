name: Deploy to GitHub Pages

on:
  push:
    branches: 'master'

# Esta variable quita el error de "deprecated" que mencionaste
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Vamos a la versión más moderna de 2026
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Usamos --verbose para ver por qué da "exit code 1"
        run: npm run build -- --verbose

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4